<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nextbase Letterhead</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Geist:wght@400&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Geist', 'Inter', sans-serif;
      color: #0a0a0a;
    }

    .page {
      width: 595px;
      min-height: 842px;
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER ───────────────────────────────── */
    .header {
      width: 556px;
      margin: 21px auto 0;
      display: flex;
      align-items: center;
      height: 64px;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 168px;
    }

    .logo-icon {
      width: 43px;
      height: 43px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 0px;
    }

    .logo-name {
      font-family: 'Poppins', sans-serif;
      font-size: 15.5px;
      font-weight: 600;
      color: #0a0a0a;
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-family: 'Poppins', sans-serif;
      font-size: 7.5px;
      font-weight: 500;
      color: #525252;
      line-height: 1.4;
    }

    .header-divider {
      width: 556px;
      margin: 0 auto;
      height: 1px;
      background: #e5e5e5;
    }

    /* ── CONTENT ──────────────────────────────── */
    .content {
      flex: 1;
      width: 556px;
      margin: 0 auto;
      padding: 28px 0 32px;
      font-size: 11px;
      line-height: 1.7;
      color: #0a0a0a;
    }

    .content h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; font-family: 'Poppins', sans-serif; }
    .content h2 { font-size: 13px; font-weight: 600; margin-bottom: 8px; margin-top: 16px; font-family: 'Poppins', sans-serif; }
    .content h3 { font-size: 12px; font-weight: 600; margin-bottom: 6px; margin-top: 12px; font-family: 'Poppins', sans-serif; }
    .content p  { margin-bottom: 10px; }
    .content ul, .content ol { margin: 6px 0 10px 18px; }
    .content li { margin-bottom: 3px; }
    .content hr { border: none; border-top: 1px solid #e5e5e5; margin: 14px 0; }
    .content blockquote { border-left: 3px solid #e5e5e5; padding-left: 12px; color: #525252; margin: 8px 0; }
    .content strong { font-weight: 600; }
    .content em { font-style: italic; }
    .content code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-family: monospace; }

    /* ── FOOTER ───────────────────────────────── */
    .footer {
      width: 556px;
      margin: 0 auto 0;
      padding-bottom: 20px;
    }

    .footer-divider {
      width: 556px;
      height: 1px;
      background: #e5e5e5;
      margin-bottom: 16px;
    }

    .footer-contacts {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-text {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #525252;
      line-height: 1;
    }

    .footer-addr-divider {
      width: 556px;
      height: 1px;
      background: #e5e5e5;
      margin-bottom: 12px;
    }

    .footer-address {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .footer-address .footer-text {
      flex: 1;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-block">
      <!-- Logo icon (Nextbase circle mark) -->
      <svg class="logo-icon" viewBox="0 0 43 43" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.3257 0C33.1036 0 42.6515 9.54797 42.6515 21.3258C42.6515 33.1037 33.1036 42.6515 21.3257 42.6515C9.54788 42.6515 0 33.1037 0 21.3258C1.11467e-05 9.54796 9.54788 0 21.3257 0ZM9.68693 21.2817L21.266 20.5198L26.6016 31.2282V11.5184L9.68693 21.2817Z" fill="#0A0A0A"/>
      </svg>
      <div class="logo-text">
        <span class="logo-name">Nextbase</span>
        <span class="logo-sub">Solutions Private Limited</span>
      </div>
    </div>
  </div>

  <div class="header-divider"></div>

  <!-- CONTENT -->
  <div class="content">
    {{NOTION_CONTENT}}
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-divider"></div>

    <div class="footer-contacts">
      <!-- Email -->
      <div class="footer-row">
        <div class="footer-icon">
          <svg width="13" height="11" viewBox="0 0 13 11" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="12" height="10" rx="1.5" stroke="#525252"/>
            <path d="M1 1L6.5 6.5L12 1" stroke="#525252"/>
          </svg>
        </div>
        <span class="footer-text">contact@nextbase.solutions</span>
      </div>

      <!-- Phone -->
      <div class="footer-row">
        <div class="footer-icon">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 8.5L8.5 10C4.5 10 2 7.5 2 3.5L3.5 1L5.5 4L4.5 5C5 6.5 6.5 7.5 7.5 7.5L8.5 6.5L11 8.5Z" stroke="#525252" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="footer-text">+91 94271 36629</span>
      </div>

      <!-- Website -->
      <div class="footer-row">
        <div class="footer-icon">
          <svg width="12" height="13" viewBox="0 0 12 13" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6" cy="6.5" r="5.5" stroke="#525252"/>
            <path d="M1 6.5H11M6 1.5C6 1.5 4 3.5 4 6.5C4 9.5 6 11.5 6 11.5C6 11.5 8 9.5 8 6.5C8 3.5 6 1.5 6 1.5Z" stroke="#525252"/>
          </svg>
        </div>
        <span class="footer-text">www.nextbase.solutions</span>
      </div>
    </div>

    <div class="footer-addr-divider"></div>

    <!-- Address -->
    <div class="footer-address">
      <div class="footer-icon">
        <svg width="12" height="13" viewBox="0 0 12 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6" cy="6" r="2" stroke="#525252"/>
          <path d="M10 6C10 9.5 6 12 6 12C6 12 2 9.5 2 6C2 3.79086 3.79086 2 6 2C8.20914 2 10 3.79086 10 6Z" stroke="#525252"/>
        </svg>
      </div>
      <span class="footer-text">505 RIO Bussiness Hub, Beside KBC 2, Yamuna Chowk, Mota Varachha, Surat, Gujarat 394101.</span>
    </div>
  </div>

</div>
</body>
</html>
